<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>

    <main>
        <div class="container">
            <p class="titulo">Nome:</p>
            <img src="./img/men.png" class="imagem-usuario">

            <div class="nome">
                <input type="text" placeholder="Nome do usuario" class="input-nome">
                <button class="btn-add-name">Enviar</button>
            </div>

            <div class="tarefa">
                <input type="file" placeholder="Nome da tarefa" class="input-tarefa">
                <button class="btn-add-task">Enviar</button>
            </div>

            <ul class="lista-tarefas"></ul>
        </div>
    </main>


    <script src="index.js"></script>
</body>
</html>
